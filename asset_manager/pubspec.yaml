name: asset_manager
description: 企业资产管理移动应用 - Flutter实现
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 本地数据库
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  # 状态管理
  provider: ^6.1.1
  # 条码/二维码扫描
  mobile_scanner: ^3.5.6
  # 日期格式化
  intl: ^0.19.0
  # UUID生成
  uuid: ^4.2.1
  # 路径
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
